name: Daily Contract Scraper

on:
  schedule:
    # Daily scrape + enrichment: 4:00 AM CT = 9:00 AM UTC (CDT) — early start to beat GitHub queue delays
    - cron: '0 9 * * *'
    # Weekly digest: Monday 5:00 AM CT = 10:00 AM UTC (CDT) — targets 7am CT delivery even with GitHub delays
    - cron: '0 10 * * 1'
  workflow_dispatch:
    inputs:
      send_digest:
        description: 'Also send email digest?'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SAM_API_KEY: ${{ secrets.SAM_API_KEY }}
        run: |
          cd scrapers
          python run_all.py

      - name: Run AI enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd enrichment
          python enrich.py

      - name: Send weekly digest (Mondays only)
        if: github.event.schedule == '0 10 * * 1' || github.event.inputs.send_digest == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: "TX Contract Intel"
        run: |
          cd digest
          python send_digest.py
